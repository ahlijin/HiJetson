# 语音模块参数配置

voice_capture:
  ros__parameters:
    sample_rate: 16000
    frame_size: 1920      # 120ms, 与 VAD 30ms 对齐 (480×4)
    device_index: 0       # 0 = ASTRA Pro USB Audio (hw:0,0)
    channels: 1           # 单声道直采
    hp_cutoff: 300        # 高通滤波，去除 Jetson 风扇噪声

voice_vad:
  ros__parameters:
    sample_rate: 16000
    frame_ms: 30
    silence_timeout: 0.5
    vad_mode: 3            # 0=最低 3=最严格
    min_energy: 0.015      # RMS能量门限，过滤环境噪声

voice_asr:
  ros__parameters:
    model_size: "base"     # tiny/base/small/medium/large
    device: "cuda"         # cuda or cpu
    language: "zh"
    sample_rate: 16000
    hp_cutoff: 300         # 高通滤波，去除 Jetson 风扇噪声
