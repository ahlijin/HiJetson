# 语音模块参数配置

voice_capture:
  sample_rate: 16000
  frame_size: 1600
  device_index: 0     # 0 = ASTRA Pro USB Audio
  channels: 2         # ASTRA Pro is 2ch stereo

voice_vad:
  sample_rate: 16000
  frame_ms: 30
  silence_timeout: 0.5
  vad_mode: 1

voice_asr:
  model_path: "/home/nvidia/.cache/modelscope/pengzhendong/faster-whisper-base"
  model_size: "base"
  device: "cpu"
  compute_type: "int8"
  language: "zh"
  sample_rate: 16000
